input[type="number"]::-webkit-inner-spin-button,

margin: 0;

.custom-checkbox {
position: relative;
display: flex;
align-items: center;
cursor: pointer;
}
.custom-checkbox input {
position: absolute;
opacity: 0;
cursor: pointer;
}
.checkmark {
height: 18px;
width: 18px;
background-color: white;
border: 1px solid #ddd;
border-radius: 4px;
display: flex;
align-items: center;
justify-content: center;
}
.custom-checkbox input:checked ~ .checkmark {
background-color: #F9C64B;
border-color: #F9C64B;
}
.checkmark:after {
content: "";
display: none;
width: 5px;
height: 10px;
border: solid white;
border-width: 0 2px 2px 0;
transform: rotate(45deg);
}
.custom-checkbox input:checked ~ .checkmark:after {
display: block;
}
.custom-switch {
position: relative;
display: inline-block;
width: 44px;
height: 24px;
}
.custom-switch input {
opacity: 0;
width: 0;
height: 0;
}
.slider {
position: absolute;
cursor: pointer;
top: 0;
left: 0;
right: 0;
bottom: 0;
background-color: #ccc;
transition: .4s;
border-radius: 24px;
}
.slider:before {
position: absolute;
content: "";
height: 18px;
width: 18px;
left: 3px;
bottom: 3px;
background-color: white;
transition: .4s;
border-radius: 50%;
}
input:checked + .slider {
background-color: #F9C64B;
}
input:checked + .slider:before {
transform: translateX(20px);
}
.custom-range {
-webkit-appearance: none;
width: 100%;
height: 4px;
background: #ddd;
border-radius: 4px;
outline: none;
}
.custom-range::-webkit-slider-thumb {
-webkit-appearance: none;
appearance: none;
width: 16px;
height: 16px;
background: #F9C64B;
border-radius: 50%;
cursor: pointer;
}
.custom-range::-moz-range-thumb {
width: 16px;
height: 16px;
background: #F9C64B;
border-radius: 50%;
cursor: pointer;
}
.table-checkbox {
width: 20px;
height: 20px;

.table-checkbox input:indeterminate ~ .checkmark {
background-color: #F9C64B;

content: "";
display: block;

height: 2px;

top: 50%;
left: 50%;

const productsTableBody = document.getElementById('productsTableBody');
function renderProductsTable() {
productsTableBody.innerHTML = '';
products.forEach(product => {
const row = document.createElement('tr');
row.className = 'border-t border-gray-100 hover:bg-gray-50';
row.innerHTML = `
<td class="p-4">
<label class="custom-checkbox table-checkbox">
<input type="checkbox" class="product-checkbox" data-id="${product.id}">
<span class="checkmark"></span>
</label>
</td>
<td class="p-4">
<img src="${product.image}" alt="${product.name}" class="w-12 h-12 object-cover object-top rounded">
</td>
<td class="p-4">
<div class="font-medium">${product.name}</div>
</td>
<td class="p-4 text-sm text-gray-500">${product.sku}</td>
<td class="p-4">
<span class="px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded-full">${product.category}</span>
</td>
<td class="p-4 text-sm">${product.material}</td>
<td class="p-4 font-medium text-primary">$${product.price.toLocaleString()}</td>
<td class="p-4">
${product.stock <= 5
? `<div class="flex items-center"><span class="font-medium text-red-500">${product.stock}</span><span class="ml-2 px-2 py-0.5 bg-red-100 text-red-600 text-xs rounded-full">Low</span></div>`
: `<span class="font-medium">${product.stock}</span>`}
</td>
<td class="p-4">
<div class="flex items-center gap-2">
<button class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-gray-100 !rounded-button whitespace-nowrap">
<div class="w-4 h-4 flex items-center justify-center text-gray-500">
<i class="ri-eye-line"></i>
</div>
</button>
<button class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-gray-100 !rounded-button whitespace-nowrap">
<div class="w-4 h-4 flex items-center justify-center text-primary">
<i class="ri-edit-line"></i>
</div>
</button>
<button class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-gray-100 !rounded-button whitespace-nowrap">
<div class="w-4 h-4 flex items-center justify-center text-red-500">
<i class="ri-delete-bin-line"></i>
</div>
</button>
</div>
</td>
`;
productsTableBody.appendChild(row);
});
// Add event listeners to checkboxes
const productCheckboxes = document.querySelectorAll('.product-checkbox');
productCheckboxes.forEach(checkbox => {
checkbox.addEventListener('change', updateSelectedCount);
});
}
// Initialize the table
renderProductsTable();
// Filter panel toggle
const filterBtn = document.getElementById('filterBtn');
const filterPanel = document.getElementById('filterPanel');
const closeFilterBtn = document.getElementById('closeFilterBtn');
filterBtn.addEventListener('click', () => {
filterPanel.classList.toggle('hidden');
});
closeFilterBtn.addEventListener('click', () => {
filterPanel.classList.add('hidden');
});
// Bulk action dropdown
const bulkActionBtn = document.getElementById('bulkActionBtn');
const bulkActionMenu = document.getElementById('bulkActionMenu');
bulkActionBtn.addEventListener('click', () => {
bulkActionMenu.classList.toggle('hidden');
});
// Close bulk action menu when clicking outside
document.addEventListener('click', (event) => {
if (!bulkActionBtn.contains(event.target) && !bulkActionMenu.contains(event.target)) {
bulkActionMenu.classList.add('hidden');
}
});
// Select all functionality
const selectAllCheckbox = document.getElementById('selectAll');
selectAllCheckbox.addEventListener('change', () => {
const productCheckboxes = document.querySelectorAll('.product-checkbox');
productCheckboxes.forEach(checkbox => {
checkbox.checked = selectAllCheckbox.checked;
});
updateSelectedCount();
});
// Update selected count
function updateSelectedCount() {
const selectedCheckboxes = document.querySelectorAll('.product-checkbox:checked');
const selectedCount = document.getElementById('selectedCount');
selectedCount.textContent = selectedCheckboxes.length;
// Update select all checkbox state
const productCheckboxes = document.querySelectorAll('.product-checkbox');
if (selectedCheckboxes.length === 0) {
selectAllCheckbox.checked = false;
selectAllCheckbox.indeterminate = false;
} else if (selectedCheckboxes.length === productCheckboxes.length) {
selectAllCheckbox.checked = true;
selectAllCheckbox.indeterminate = false;
} else {
selectAllCheckbox.indeterminate = true;
}
}
// Price range slider
const priceRange = document.getElementById('priceRange');
const minPriceDisplay = document.getElementById('minPriceDisplay');
const maxPriceDisplay = document.getElementById('maxPriceDisplay');
priceRange.addEventListener('input', () => {
maxPriceDisplay.textContent = parseInt(priceRange.value).toLocaleString();
});
// Reset filters
const resetFilterBtn = document.getElementById('resetFilterBtn');
resetFilterBtn.addEventListener('click', () => {
const filterCheckboxes = document.querySelectorAll('.filter-checkbox');
filterCheckboxes.forEach(checkbox => {
checkbox.checked = false;
});
priceRange.value = 10000;
maxPriceDisplay.textContent = '10,000';
});
// Apply filters (just hide the panel for demo)
const applyFilterBtn = document.getElementById('applyFilterBtn');
applyFilterBtn.addEventListener('click', () => {
filterPanel.classList.add('hidden');
});
</script>
</body>
</html>
